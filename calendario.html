  <title>Calendário</title>

</head>

<body>

  <nav>

  <div class="calendar-container">

    <h1>📅 Agenda do Clube</h1>



    <div class="calendar-form">

      <input
        type="text"
        id="dayInput"
        placeholder="Dia do clube"
      >



      <input
        type="text"
        id="activityInput"
        placeholder="Atividade"
      >



      <textarea
        id="noteInput"
        placeholder="Observações"
      ></textarea>



      <button id="saveEventBtn">
        Salvar Agenda
      </button>

    </div>



    <div id="eventsList"></div>

  </div>



  <script type="module" src="calendario.js"></script>

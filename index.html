<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Clube Escolar</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <nav>

    <div class="nav-left">

      <a href="index.html">Início</a>

      <a href="sobre.html">Sobre</a>

      <a href="chat.html">Chat</a>

      <a href="votacao.html">Votação</a>

      <a href="calendario.html">Calendário</a>

    </div>



    <div class="nav-right">

      <select id="roleSelect">

        <option value="student">
          Estudante
        </option>

        <option value="leader">
          Líder de Clube
        </option>

        <option value="director">
          Diretor / Vice-diretor
        </option>

      </select>



      <input
        type="password"
        id="codeInput"
        placeholder="Código de acesso"
      >



      <button id="loginBtn">
        Entrar com Google
      </button>



      <div id="user"></div>

    </div>

  </nav>



  <div class="container">

    <h1>🎓 Clube Escolar</h1>



    <p>

      Bem-vindo ao sistema oficial do clube escolar.

      Aqui os alunos podem conversar,

      votar nas atividades,

      visualizar o calendário do clube

      e acompanhar as novidades.

    </p>

  </div>



  <!-- MODAL PERFIL -->

  <div id="profileModal" class="modal">

    <div class="modal-content">

      <span id="closeProfileModal">
        &times;
      </span>



      <h2>
        Editar Perfil
      </h2>



      <input
        type="text"
        id="newName"
        placeholder="Novo nome"
      >



      <input
        type="file"
        id="newPhoto"
        accept="image/*"
      >



      <button id="saveProfileBtn">
        Salvar Perfil
      </button>

    </div>

  </div>



  <script type="module" src="script.js"></script>

</body>
</html>
